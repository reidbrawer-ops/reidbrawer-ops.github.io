<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paddle Fit Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Quicksand:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     DESIGN TOKENS — swap these to reskin for your brand
     ============================================================ */
  :root{
    --ink:#18232b;         /* headings, primary text */
    --forest:#1f5a40;      /* eyebrow labels */
    --teal:#1c6c84;        /* primary interactive color */
    --teal-tint:#eaf3f5;   /* selected bg */
    --lime:#d8e84c;        /* "best match" highlight — keep rare */
    --lime-border:#c3d43e;
    --lime-text:#113240;
    --ice-tint:#e8f0f4;    /* #2 / #3 rank pills */
    --ice-border:#d3e3ea;
    --terracotta:#8f3a20;  /* skill-level tag */
    --terracotta-tint:#f8e8e4;
    --terracotta-border:#f0d4cc;
    --slate:#5c6c70;       /* secondary / body text */
    --line:#e5eaea;        /* borders */
    --divider:#edf1f0;
    --dot-empty:#e0e4e4;
    --page-bg:#f4f8f8;
    --card-bg:#ffffff;
    --font-display:'Quicksand',sans-serif;
    --font-body:'DM Sans',sans-serif;
    --font-mono:'Space Mono',monospace;
  }

  *{box-sizing:border-box;}
  body{margin:0;background:var(--page-bg);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;}
  a{color:var(--teal);}

  .app{max-width:1000px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  /* ---- top chrome ---- */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:24px 32px 0;}
  .wordmark{font-family:var(--font-mono);font-weight:700;font-size:13px;letter-spacing:.5px;color:var(--teal);}
  .step-label{font-family:var(--font-mono);font-weight:700;font-size:12px;color:var(--slate);}
  .progress-track{height:4px;background:var(--line);margin:16px 32px 0;border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .35s ease;}
  .back-row{padding:18px 32px 0;}
  .back-btn{font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--slate);background:none;border:0;padding:4px 0;cursor:pointer;}
  .back-btn:hover{color:var(--teal);}

  .main{flex:1;padding:26px 32px 56px;display:flex;flex-direction:column;}

  /* ---- start screen ---- */
  .start-wrap{max-width:480px;margin:36px auto 0;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;}
  .eyebrow{font-family:var(--font-mono);font-weight:700;font-size:12px;letter-spacing:1.5px;color:var(--forest);text-transform:uppercase;}
  .h1{font-family:var(--font-display);font-weight:700;font-size:38px;line-height:1.15;color:var(--ink);margin:0;letter-spacing:-.5px;}
  .sub{font-family:var(--font-body);font-size:15.5px;line-height:1.6;color:var(--slate);margin:0;max-width:400px;}
  .meta{font-family:var(--font-mono);font-size:12px;letter-spacing:1px;color:var(--slate);}
  .img-placeholder{width:100%;max-width:360px;height:170px;border:1.5px dashed var(--line);border-radius:18px;display:flex;align-items:center;justify-content:center;color:var(--slate);font-family:var(--font-body);font-size:13px;text-align:center;padding:16px;}

  .btn-primary{font-family:var(--font-mono);font-weight:700;font-size:14px;color:#fff;background:var(--teal);border:0;border-radius:999px;padding:15px 30px;cursor:pointer;transition:filter .15s ease;}
  .btn-primary:hover{filter:brightness(1.08);}

  /* ---- question screen ---- */
  .q-wrap{max-width:620px;width:100%;margin:8px auto 0;display:flex;flex-direction:column;}
  .q-eyebrow{font-family:var(--font-mono);font-weight:700;font-size:11.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--forest);}
  .q-title{font-family:var(--font-display);font-weight:700;font-size:27px;color:var(--ink);margin:8px 0 0;letter-spacing:-.3px;}
  .q-sub{font-family:var(--font-body);font-size:14.5px;color:var(--slate);margin:8px 0 24px;line-height:1.5;}

  .cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;}
  .opt-card{text-align:left;cursor:pointer;padding:18px 20px;border-radius:16px;display:flex;flex-direction:column;gap:6px;
    border:1.5px solid var(--line);background:#fff;transition:border-color .15s ease,background .15s ease;width:100%;}
  .opt-card:hover{border-color:var(--teal);}
  .opt-card.selected{border-color:var(--teal);background:var(--teal-tint);}
  .opt-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .opt-label{font-family:var(--font-display);font-weight:600;font-size:16px;color:var(--ink);}
  .opt-desc{font-family:var(--font-body);font-size:13.5px;color:var(--slate);line-height:1.4;}
  .radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--dot-empty);flex:none;display:flex;align-items:center;justify-content:center;}
  .radio.selected{border-color:var(--teal);}
  .radio-dot{width:9px;height:9px;border-radius:50%;background:var(--teal);}
  .check{width:18px;height:18px;border-radius:5px;border:2px solid var(--dot-empty);flex:none;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;background:transparent;}
  .check.selected{border-color:var(--teal);background:var(--teal);}

  .nav-row{display:flex;justify-content:flex-end;margin-top:30px;}
  .btn-next{font-family:var(--font-mono);font-weight:700;font-size:14px;color:#fff;background:var(--teal);border:0;border-radius:999px;padding:13px 26px;cursor:pointer;transition:filter .15s ease,opacity .15s ease;}
  .btn-next:hover{filter:brightness(1.08);}
  .btn-next:disabled{opacity:.4;cursor:not-allowed;filter:none;}

  /* ---- results screen ---- */
  .results-eyebrow{font-family:var(--font-mono);font-weight:700;font-size:11.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--forest);display:block;}
  .results-title{font-family:var(--font-display);font-weight:700;font-size:26px;color:var(--ink);margin:4px 0 20px;}
  .results-card{border:1px solid var(--line);border-radius:20px;background:var(--card-bg);}
  .table-scroll{overflow-x:auto;}
  .table-inner{min-width:660px;}

  .row-header,.row-metric,.row-footer{display:grid;grid-template-columns:110px repeat(3,1fr);gap:14px;}
  .row-header{padding:24px 22px 18px;}
  .row-metric{padding:13px 22px;border-top:1px solid var(--divider);align-items:center;}
  .row-footer{padding:20px 22px 24px;border-top:1px solid var(--divider);}
  .label-cell{position:sticky;left:0;background:var(--card-bg);font-family:var(--font-mono);font-size:12px;color:var(--slate);}

  .paddle-head{display:flex;flex-direction:column;gap:8px;min-width:0;}
  .paddle-name{font-family:var(--font-display);font-weight:700;font-size:17px;color:var(--ink);}
  .rank-pill{display:inline-flex;width:fit-content;align-items:center;font-family:var(--font-mono);font-weight:700;font-size:12px;padding:4px 12px;border-radius:999px;border:1px solid transparent;}
  .rank-best{background:var(--lime);border-color:var(--lime-border);color:var(--lime-text);}
  .rank-other{background:var(--ice-tint);border-color:var(--ice-border);color:var(--lime-text);}
  .paddle-meta{font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--ink);}
  .paddle-blurb{font-family:var(--font-body);font-size:12.5px;color:var(--slate);line-height:1.45;}

  .pill-tag{display:inline-flex;font-family:var(--font-mono);font-weight:700;font-size:12px;padding:4px 13px;border-radius:999px;background:var(--terracotta-tint);color:var(--terracotta);border:1px solid var(--terracotta-border);}
  .cell-text{font-family:var(--font-body);font-weight:600;font-size:14px;color:var(--ink);}
  .dots{display:flex;gap:5px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--dot-empty);display:inline-block;}
  .dot.filled{background:var(--teal);}

  .search-btn{width:fit-content;text-decoration:none;font-family:var(--font-mono);font-weight:700;font-size:13px;color:var(--teal);border:1.5px solid var(--teal);border-radius:999px;padding:11px 18px;display:inline-block;transition:background .15s ease;}
  .search-btn:hover{background:var(--teal-tint);}
  .retake-btn{margin-top:20px;font-family:var(--font-mono);font-weight:700;font-size:13px;color:var(--teal);background:none;border:1.5px solid var(--teal);border-radius:999px;padding:11px 20px;cursor:pointer;transition:background .15s ease;align-self:flex-start;}
  .retake-btn:hover{background:var(--teal-tint);}

  @media (max-width: 560px){
    .topbar,.back-row,.main{padding-left:18px;padding-right:18px;}
    .progress-track{margin-left:18px;margin-right:18px;}
    .h1{font-size:30px;}
  }
</style>

</head>
<body>

<script>
/* ============================================================
   CONTENT — questions + paddle catalog. Edit freely.
   ============================================================ */
const QUESTIONS = [
  { key: 'skill', eyebrow: 'SKILL LEVEL', title: 'How would you rate your skill level?', subtitle: "Be honest — we'll find a paddle that fits where you are right now.", type: 'single', options: [
    { value: 'beginner', label: 'Beginner', desc: 'New to pickleball or still learning the basics.' },
    { value: 'intermediate', label: 'Intermediate', desc: 'Comfortable in rallies, working on strategy.' },
    { value: 'advanced', label: 'Advanced', desc: 'Competitive play with strong control and shot variety.' },
    { value: 'pro', label: 'Pro / Tournament', desc: 'Tournament-level play and dialed-in technique.' }
  ]},
  { key: 'frequency', eyebrow: 'HOW OFTEN YOU PLAY', title: 'How often do you get on the court?', subtitle: 'This helps us gauge how much paddle you need.', type: 'single', options: [
    { value: 'rarely', label: 'A few times a year', desc: 'Casual, social games here and there.' },
    { value: 'weekly', label: 'Weekly', desc: 'A regular game or two most weeks.' },
    { value: 'frequent', label: 'A few times a week', desc: 'Pickleball is a real part of your routine.' },
    { value: 'daily', label: 'Daily / competitive', desc: 'You train, drill, and play tournaments.' }
  ]},
  { key: 'style', eyebrow: 'PLAY STYLE', title: 'What best describes your game?', subtitle: 'Pick the style closest to how you actually play.', type: 'single', options: [
    { value: 'power', label: 'Power banger', desc: 'You want pace — hard drives and big put-away shots.' },
    { value: 'allround', label: 'All-around', desc: 'A bit of everything — power, spin, and touch.' },
    { value: 'spin', label: 'Spin & control', desc: 'You place the ball and generate heavy topspin.' },
    { value: 'soft', label: 'Soft game & resets', desc: 'You live at the kitchen line — dinks, resets, touch.' }
  ]},
  { key: 'current', eyebrow: 'CURRENT PADDLE', title: 'What would you change about your current paddle?', subtitle: "Pick all that apply — or tell us it's your first paddle.", type: 'multi', options: [
    { value: 'more_power', label: 'More power', desc: 'Drives and put-aways need more mustard.' },
    { value: 'more_spin', label: 'More spin', desc: 'Want more bite on topspin and serves.' },
    { value: 'more_forgiveness', label: 'A bigger sweet spot', desc: 'Off-center hits punish you too much.' },
    { value: 'less_weight', label: 'Lighter swing weight', desc: 'Current paddle feels heavy late in matches.' },
    { value: 'less_arm_strain', label: 'Less arm strain', desc: 'You feel it in your elbow or wrist after playing.' },
    { value: 'first_paddle', label: "Nothing — it's my first paddle", desc: '', exclusive: true }
  ]},
  { key: 'shape', eyebrow: 'PADDLE SHAPE', title: 'Standard or elongated?', subtitle: 'Shape trades reach and spin for sweet spot size.', type: 'single', options: [
    { value: 'standard', label: 'Standard', desc: 'Wider face, bigger sweet spot, more forgiving.' },
    { value: 'elongated', label: 'Elongated', desc: 'More reach and swing speed, smaller sweet spot.' },
    { value: 'hybrid', label: 'Hybrid', desc: 'A middle ground between the two.' },
    { value: 'notsure', label: 'Not sure', desc: 'Recommend what fits my other answers.' }
  ]},
  { key: 'sensitivity', eyebrow: 'ARM & WRIST', title: 'Any elbow, wrist, or shoulder sensitivity?', subtitle: "We'll favor lighter, more forgiving paddles if so.", type: 'single', options: [
    { value: 'none', label: 'None', desc: 'No issues — optimize for performance.' },
    { value: 'mild', label: 'Occasional soreness', desc: 'Nothing serious, but worth some caution.' },
    { value: 'sensitive', label: 'Yes, ongoing issues', desc: 'Prioritize a light, arm-friendly paddle.' }
  ]},
  { key: 'totalWeight', eyebrow: 'TOTAL WEIGHT', title: 'Lighter or heavier overall?', subtitle: "There's no one right weight — only what your arm and swing prefer.", type: 'single', options: [
    { value: 'light', label: 'Lighter', desc: 'Faster hands and less fatigue late in matches.' },
    { value: 'neutral', label: 'No strong preference', desc: 'Happy to split the difference.' },
    { value: 'heavy', label: 'Heavier', desc: 'More plow-through and stability on contact.' }
  ]},
  { key: 'swingWeight', eyebrow: 'SWING WEIGHT', title: 'How should it feel when you swing it?', subtitle: 'Swing weight is how heavy the paddle feels in motion, not just on a scale.', type: 'single', options: [
    { value: 'low', label: 'Lower swing weight', desc: 'Faster hands and easier maneuverability.' },
    { value: 'mid', label: 'Balanced', desc: 'A bit of both — no strong preference.' },
    { value: 'high', label: 'Higher swing weight', desc: 'More plow-through and stability, slower hands.' }
  ]},
  { key: 'twistWeight', eyebrow: 'TWIST WEIGHT', title: 'How much should off-center hits punish you?', subtitle: 'Twist weight is how much the paddle resists turning on a mishit.', type: 'single', options: [
    { value: 'high', label: 'Bigger sweet spot', desc: 'More stability and a larger effective sweet spot.' },
    { value: 'mid', label: 'No strong preference', desc: 'Somewhere in between.' },
    { value: 'low', label: 'Precise & lively', desc: 'Less forgiving on mishits, but a crisper, more direct feel.' }
  ]},
  { key: 'budget', eyebrow: 'BUDGET', title: "What's your budget?", subtitle: "We'll prioritize this range, but still surface the best overall fit.", type: 'single', options: [
    { value: 'under150', label: 'Under $150', desc: 'Great value, entry-level builds.' },
    { value: '150to200', label: '$150 – $200', desc: 'The sweet spot for most players.' },
    { value: '200to250', label: '$200 – $250', desc: 'Premium construction and materials.' },
    { value: '250plus', label: '$250+', desc: "Top-of-line — budget isn't the priority." }
  ]}
];

const PADDLES = [
  { brand: 'Halcyon', model: 'Cirrus', price: 189, weight: 7.8, shape: 'standard', skill: ['beginner', 'intermediate'], bestFor: 'Beginner–Intermediate', power: 2, resets: 3, spin: 2, forgiveness: 3, swingWeight: 2, twistWeight: 3, balance: 2, armFriendly: false, blurb: 'An easygoing all-arounder that keeps rallies going.' },
  { brand: 'Halcyon', model: 'Squall', price: 219, weight: 8.3, shape: 'elongated', skill: ['advanced', 'pro'], bestFor: 'Advanced–Pro', power: 3, resets: 1, spin: 2, forgiveness: 1, swingWeight: 3, twistWeight: 1, balance: 3, armFriendly: false, blurb: 'Built for pace — big put-aways, small margin for error.' },
  { brand: 'Rivet', model: 'Anchor', price: 175, weight: 7.5, shape: 'standard', skill: ['beginner', 'intermediate'], bestFor: 'Beginner–Intermediate', power: 1, resets: 3, spin: 2, forgiveness: 3, swingWeight: 1, twistWeight: 3, balance: 1, armFriendly: true, blurb: 'Soft and controlled — built for resets at the kitchen.' },
  { brand: 'Rivet', model: 'Torque', price: 229, weight: 8.0, shape: 'standard', skill: ['intermediate', 'advanced'], bestFor: 'Intermediate–Advanced', power: 2, resets: 2, spin: 3, forgiveness: 2, swingWeight: 2, twistWeight: 2, balance: 2, armFriendly: false, blurb: 'Heavy bite on topspin and slice for players who place the ball.' },
  { brand: 'Tempo', model: 'Vantage Pro', price: 259, weight: 8.1, shape: 'elongated', skill: ['advanced', 'pro'], bestFor: 'Advanced–Pro', power: 3, resets: 2, spin: 3, forgiveness: 2, swingWeight: 3, twistWeight: 2, balance: 3, armFriendly: false, blurb: 'Balanced between power and spin, with reach to match.' },
  { brand: 'Tempo', model: 'Glide', price: 159, weight: 7.3, shape: 'standard', skill: ['beginner'], bestFor: 'Beginner', power: 1, resets: 3, spin: 1, forgiveness: 3, swingWeight: 1, twistWeight: 3, balance: 1, armFriendly: true, blurb: 'Light, quick, and endlessly forgiving for new players.' },
  { brand: 'Nordlane', model: 'Ferrous H', price: 199, weight: 8.1, shape: 'hybrid', skill: ['advanced'], bestFor: 'Advanced', power: 2, resets: 2, spin: 3, forgiveness: 2, swingWeight: 2, twistWeight: 2, balance: 2, armFriendly: false, blurb: 'Balanced, with a bit more bite on topspin and slice.' },
  { brand: 'Nordlane', model: 'Ferrous L', price: 199, weight: 7.6, shape: 'hybrid', skill: ['intermediate'], bestFor: 'Intermediate', power: 2, resets: 2, spin: 2, forgiveness: 3, swingWeight: 1, twistWeight: 3, balance: 1, armFriendly: true, blurb: 'The same balanced feel as the Ferrous H, tuned lighter.' },
  { brand: 'Solace', model: 'Ease', price: 169, weight: 7.4, shape: 'standard', skill: ['beginner', 'intermediate'], bestFor: 'Beginner–Intermediate', power: 1, resets: 3, spin: 1, forgiveness: 3, swingWeight: 1, twistWeight: 3, balance: 1, armFriendly: true, blurb: 'Soft and arm-friendly for players managing elbow or wrist strain.' },
  { brand: 'Kestrel', model: 'Raptor EX', price: 269, weight: 8.4, shape: 'elongated', skill: ['advanced', 'pro'], bestFor: 'Advanced–Pro', power: 3, resets: 1, spin: 3, forgiveness: 1, swingWeight: 3, twistWeight: 1, balance: 3, armFriendly: false, blurb: 'Maximum power and spin for a smaller sweet spot.' }
];

/* ============================================================
   SCORING ENGINE
   ============================================================ */
const BUDGET_RANGES = { under150: [0, 150], '150to200': [150, 200], '200to250': [200, 250], '250plus': [250, 999] };
const LEVELS = ['beginner', 'intermediate', 'advanced', 'pro'];
const TOTAL_QUESTIONS = QUESTIONS.length;
const WEIGHT_TARGET = { light: 1, neutral: 2, heavy: 3 };
const SWING_TARGET = { low: 1, mid: 2, high: 3 };
const TWIST_TARGET = { low: 1, mid: 2, high: 3 };

function weightBucket(p) { return p.weight <= 7.6 ? 1 : (p.weight <= 8.05 ? 2 : 3); }

function inferBalance(a) {
  // Balance point is never asked directly — inferred from play style + sensitivity + gripes.
  let bal = 2;
  const styleBal = { power: 3, allround: 2, spin: 2.3, soft: 1 };
  if (a.style && styleBal[a.style] !== undefined) bal = styleBal[a.style];
  if (Array.isArray(a.current)) {
    if (a.current.includes('less_arm_strain')) bal -= 0.6;
    if (a.current.includes('more_power')) bal += 0.5;
  }
  if (a.sensitivity === 'sensitive') bal -= 0.5;
  else if (a.sensitivity === 'mild') bal -= 0.2;
  return Math.max(1, Math.min(3, bal));
}

function scoreForAnswers(p, a) {
  let s = 0;
  if (a.skill) {
    if (p.skill.includes(a.skill)) s += 6;
    else {
      const ui = LEVELS.indexOf(a.skill);
      if (p.skill.some((ps) => Math.abs(LEVELS.indexOf(ps) - ui) === 1)) s += 2;
    }
  }
  const styleW = {
    power: { power: 2, resets: 0, spin: 0.5, forgiveness: 0 },
    allround: { power: 1, resets: 1, spin: 1, forgiveness: 1 },
    spin: { power: 0.4, resets: 1, spin: 2, forgiveness: 0.2 },
    soft: { power: 0, resets: 2, spin: 0.5, forgiveness: 1.6 }
  };
  if (a.style && styleW[a.style]) {
    const w = styleW[a.style];
    s += p.power * w.power + p.resets * w.resets + p.spin * w.spin + p.forgiveness * w.forgiveness;
  }
  if (Array.isArray(a.current)) {
    a.current.forEach((c) => {
      if (c === 'more_power') s += p.power * 0.8;
      if (c === 'more_spin') s += p.spin * 0.8;
      if (c === 'more_forgiveness') s += p.forgiveness * 0.8;
      if (c === 'less_weight') s += (3 - p.swingWeight) * 1.3;
      if (c === 'less_arm_strain') s += p.armFriendly ? 3 : -1;
    });
  }
  if (a.shape && a.shape !== 'notsure') {
    if (p.shape === a.shape) s += 3;
    else if (p.shape === 'hybrid' || a.shape === 'hybrid') s += 1.2;
  }
  if (a.sensitivity === 'sensitive') {
    s += p.armFriendly ? 4 : 0;
    s += (8.5 - p.weight) * 1.5;
    s += p.forgiveness * 1.2;
  } else if (a.sensitivity === 'mild') {
    s += p.armFriendly ? 1.5 : 0;
    s += (8.5 - p.weight) * 0.4;
  }
  if (a.totalWeight && WEIGHT_TARGET[a.totalWeight]) {
    s += (2 - Math.abs(weightBucket(p) - WEIGHT_TARGET[a.totalWeight])) * 1.3;
  }
  if (a.swingWeight && SWING_TARGET[a.swingWeight]) {
    s += (2 - Math.abs(p.swingWeight - SWING_TARGET[a.swingWeight])) * 1.6;
  }
  if (a.twistWeight && TWIST_TARGET[a.twistWeight]) {
    s += (2 - Math.abs(p.twistWeight - TWIST_TARGET[a.twistWeight])) * 1.6;
  }
  s += (2 - Math.abs(p.balance - inferBalance(a))) * 1.2;
  if (a.budget && BUDGET_RANGES[a.budget]) {
    const r = BUDGET_RANGES[a.budget];
    if (p.price >= r[0] && p.price <= r[1]) s += 4;
    else s -= (p.price < r[0] ? r[0] - p.price : p.price - r[1]) / 22;
  }
  if (a.frequency === 'daily' || a.frequency === 'frequent') {
    if (p.skill.indexOf('advanced') >= 0 || p.skill.indexOf('pro') >= 0) s += 1;
  }
  if (a.frequency === 'rarely') s += p.forgiveness * 0.6;
  return s;
}

function totalWeightFitDots(p, a) {
  if (!a.totalWeight || !WEIGHT_TARGET[a.totalWeight]) return 2;
  const d = Math.abs(weightBucket(p) - WEIGHT_TARGET[a.totalWeight]);
  return d === 0 ? 3 : (d === 1 ? 2 : 1);
}
function swingWeightFitDots(p, a) {
  if (!a.swingWeight || !SWING_TARGET[a.swingWeight]) return 2;
  const d = Math.abs(p.swingWeight - SWING_TARGET[a.swingWeight]);
  return d === 0 ? 3 : (d === 1 ? 2 : 1);
}
function twistWeightFitDots(p, a) {
  if (!a.twistWeight || !TWIST_TARGET[a.twistWeight]) return 2;
  const d = Math.abs(p.twistWeight - TWIST_TARGET[a.twistWeight]);
  return d === 0 ? 3 : (d === 1 ? 2 : 1);
}
function budgetFitDots(p, a) {
  if (!a.budget || !BUDGET_RANGES[a.budget]) return 2;
  const r = BUDGET_RANGES[a.budget];
  if (p.price >= r[0] && p.price <= r[1]) return 3;
  const dist = p.price < r[0] ? r[0] - p.price : p.price - r[1];
  return dist <= 30 ? 2 : 1;
}
function formatWeight(w) {
  return (Number.isInteger(w) ? String(w) : String(Math.round(w * 100) / 100)) + 'oz';
}
function getTop3(answers) {
  return PADDLES.map((p) => Object.assign({}, p, { score: scoreForAnswers(p, answers) }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 3);
}
function searchUrl(p) {
  return 'https://www.google.com/search?q=' + encodeURIComponent(p.brand + ' ' + p.model + ' pickleball paddle');
}
function dotsHtml(n) {
  let out = '';
  for (let i = 0; i < 3; i++) out += '<span class="dot' + (i < n ? ' filled' : '') + '"></span>';
  return out;
}

/* ============================================================
   STATE + RENDER
   ============================================================ */
let state = { step: 0, answers: {} };
let advanceTimer = null;

function selectSingle(key, value) {
  state.answers = Object.assign({}, state.answers, { [key]: value });
  render();
  clearTimeout(advanceTimer);
  advanceTimer = setTimeout(() => {
    state.step = Math.min(state.step + 1, TOTAL_QUESTIONS + 1);
    render();
  }, 380);
}

function toggleMulti(key, value) {
  const q = QUESTIONS[state.step - 1];
  const cur = state.answers[key] || [];
  const optDef = q.options.find((o) => o.value === value);
  let next;
  if (optDef && optDef.exclusive) {
    next = cur.includes(value) ? [] : [value];
  } else if (cur.includes(value)) {
    next = cur.filter((v) => v !== value);
  } else {
    const withoutExclusive = cur.filter((v) => {
      const d = q.options.find((o) => o.value === v);
      return !(d && d.exclusive);
    });
    next = withoutExclusive.concat([value]);
  }
  state.answers = Object.assign({}, state.answers, { [key]: next });
  render();
}

function goNext() { clearTimeout(advanceTimer); state.step = Math.min(state.step + 1, TOTAL_QUESTIONS + 1); render(); }
function goBack() { clearTimeout(advanceTimer); state.step = Math.max(state.step - 1, 0); render(); }
function startQuiz() { state.step = 1; render(); }
function retake() { state.step = 0; state.answers = {}; render(); }

function canGoNext(q) {
  if (!q) return false;
  if (q.type === 'single') return !!state.answers[q.key];
  if (q.type === 'multi') return (state.answers[q.key] || []).length > 0;
  return true;
}

function renderOptions(q) {
  const curVal = state.answers[q.key];
  const curArr = q.type === 'multi' ? (curVal || []) : null;
  return q.options.map((o) => {
    const selected = q.type === 'multi' ? curArr.includes(o.value) : curVal === o.value;
    const action = q.type === 'multi' ? 'toggle' : 'select';
    const indicator = q.type === 'multi'
      ? '<span class="check' + (selected ? ' selected' : '') + '">' + (selected ? '✓' : '') + '</span>'
      : '<span class="radio' + (selected ? ' selected' : '') + '">' + (selected ? '<span class="radio-dot"></span>' : '') + '</span>';
    return '<button type="button" class="opt-card' + (selected ? ' selected' : '') + '" data-action="' + action + '" data-key="' + q.key + '" data-value="' + o.value + '">' +
      '<span class="opt-top"><span class="opt-label">' + o.label + '</span>' + indicator + '</span>' +
      (o.desc ? '<span class="opt-desc">' + o.desc + '</span>' : '') +
      '</button>';
  }).join('');
}

function renderStart() {
  return '' +
    '<div class="topbar"><span class="wordmark">sweetspot</span></div>' +
    '<div class="main">' +
      '<div class="start-wrap">' +
        '<span class="eyebrow">Paddle Fit Quiz</span>' +
        '<h1 class="h1">Find your paddle&#39;s sweet spot.</h1>' +
        '<p class="sub">Answer ' + TOTAL_QUESTIONS + ' quick questions about your game and we&#39;ll match you with the 3 paddles worth trying.</p>' +
        '<div class="img-placeholder"><!-- replace with your own paddle photo -->Drop a paddle photo here</div>' +
        '<span class="meta">' + TOTAL_QUESTIONS + ' QUESTIONS · ~2 MIN</span>' +
        '<button type="button" class="btn-primary" data-action="start">Start the quiz →</button>' +
      '</div>' +
    '</div>';
}

function renderQuestion() {
  const q = QUESTIONS[state.step - 1];
  const progressPct = Math.round(((state.step - 1) / TOTAL_QUESTIONS) * 100);
  const stepLabel = 'Question ' + state.step + ' of ' + TOTAL_QUESTIONS;
  const nextLabel = state.step === TOTAL_QUESTIONS ? 'See my matches' : 'Next';
  const enabled = canGoNext(q);
  return '' +
    '<div class="topbar"><span class="wordmark">sweetspot</span><span class="step-label">' + stepLabel + '</span></div>' +
    '<div class="progress-track"><div class="progress-fill" style="width:' + progressPct + '%"></div></div>' +
    '<div class="back-row"><button type="button" class="back-btn" data-action="back">← Back</button></div>' +
    '<div class="main">' +
      '<div class="q-wrap">' +
        '<span class="q-eyebrow">' + q.eyebrow + '</span>' +
        '<h2 class="q-title">' + q.title + '</h2>' +
        '<p class="q-sub">' + q.subtitle + '</p>' +
        '<div class="cards-grid">' + renderOptions(q) + '</div>' +
        '<div class="nav-row"><button type="button" class="btn-next" data-action="next"' + (enabled ? '' : ' disabled') + '>' + nextLabel + ' →</button></div>' +
      '</div>' +
    '</div>';
}

function renderResults() {
  const ranked = getTop3(state.answers);
  const rankMeta = [
    { label: 'Best match', cls: 'rank-best' },
    { label: '#2', cls: 'rank-other' },
    { label: '#3', cls: 'rank-other' }
  ];
  const top3 = ranked.map((p, i) => Object.assign({}, p, {
    rankLabel: rankMeta[i].label,
    rankCls: rankMeta[i].cls,
    weightText: formatWeight(p.weight),
    priceText: '$' + p.price,
    searchHref: searchUrl(p),
    searchLabel: 'Search ' + p.brand + ' ' + p.model
  }));

  const metricRows = [
    { label: 'Best for', kind: 'pill', cells: top3.map((p) => p.bestFor) },
    { label: 'Put-away power', kind: 'dots', cells: top3.map((p) => dotsHtml(p.power)) },
    { label: 'Resets & touch', kind: 'dots', cells: top3.map((p) => dotsHtml(p.resets)) },
    { label: 'Spin', kind: 'dots', cells: top3.map((p) => dotsHtml(p.spin)) },
    { label: 'Forgiveness', kind: 'dots', cells: top3.map((p) => dotsHtml(p.forgiveness)) },
    { label: 'Weight', kind: 'text', cells: top3.map((p) => p.weightText) },
    { label: 'Swing weight fit', kind: 'dots', cells: top3.map((p) => dotsHtml(swingWeightFitDots(p, state.answers))) },
    { label: 'Twist weight fit', kind: 'dots', cells: top3.map((p) => dotsHtml(twistWeightFitDots(p, state.answers))) },
    { label: 'Total weight fit', kind: 'dots', cells: top3.map((p) => dotsHtml(totalWeightFitDots(p, state.answers))) },
    { label: 'Budget fit', kind: 'dots', cells: top3.map((p) => dotsHtml(budgetFitDots(p, state.answers))) }
  ];

  const headerRow = '<div class="row-header"><div class="label-cell"></div>' +
    top3.map((p) =>
      '<div class="paddle-head">' +
        '<span class="paddle-name">' + p.model + '</span>' +
        '<span class="rank-pill ' + p.rankCls + '">' + p.rankLabel + '</span>' +
        '<span class="paddle-meta">' + p.brand + ' · ' + p.priceText + '</span>' +
        '<span class="paddle-blurb">' + p.blurb + '</span>' +
      '</div>'
    ).join('') + '</div>';

  const metricRowsHtml = metricRows.map((row) =>
    '<div class="row-metric"><div class="label-cell">' + row.label + '</div>' +
    row.cells.map((cell) => {
      if (row.kind === 'pill') return '<div><span class="pill-tag">' + cell + '</span></div>';
      if (row.kind === 'text') return '<div><span class="cell-text">' + cell + '</span></div>';
      return '<div><span class="dots">' + cell + '</span></div>';
    }).join('') + '</div>'
  ).join('');

  const footerRow = '<div class="row-footer"><div class="label-cell"></div>' +
    top3.map((p) =>
      '<a href="' + p.searchHref + '" target="_blank" rel="noopener" class="search-btn">' + p.searchLabel + ' →</a>'
    ).join('') + '</div>';

  return '' +
    '<div class="topbar"><span class="wordmark">sweetspot</span></div>' +
    '<div class="back-row"><button type="button" class="back-btn" data-action="back">← Back</button></div>' +
    '<div class="main">' +
      '<span class="results-eyebrow">YOUR MATCHES</span>' +
      '<h2 class="results-title">Your top 3 picks</h2>' +
      '<div class="results-card"><div class="table-scroll"><div class="table-inner">' +
        headerRow + metricRowsHtml + footerRow +
      '</div></div></div>' +
      '<button type="button" class="retake-btn" data-action="retake">Retake the quiz</button>' +
    '</div>';
}

function render() {
  const app = document.getElementById('app');
  if (state.step === 0) app.innerHTML = renderStart();
  else if (state.step >= 1 && state.step <= TOTAL_QUESTIONS) app.innerHTML = renderQuestion();
  else app.innerHTML = renderResults();
}

document.getElementById('app').addEventListener('click', function (e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  if (action === 'start') startQuiz();
  else if (action === 'back') goBack();
  else if (action === 'next') { if (!el.disabled) goNext(); }
  else if (action === 'select') selectSingle(el.dataset.key, el.dataset.value);
  else if (action === 'toggle') toggleMulti(el.dataset.key, el.dataset.value);
  else if (action === 'retake') retake();
});

render();
</script>
</body>
</html>
