<!doctype html>
<!--
  Drop-in header lockup for pickleball-bay-area.web.app.
  Uses the site's own .brand pattern (logo + wordmark) from style.css.
  The mark is a plain <img> referencing mark.svg — no font baked into the
  SVG, so it stays crisp at any size and needs no extra font loading.
-->
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:#f5f7f6; font-family:'Space Grotesk',sans-serif; }
  .site-header { background:#ffffff; border-bottom:1px solid #dfe5e2; padding:0 24px; height:64px; display:flex; align-items:center; }
  .brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .brand img { display:block; border-radius:9px; }
  .brand span { font-weight:700; font-size:17px; color:#17232b; }
</style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <img src="mark.svg" width="32" height="32" alt="Pickleball Bay Area">
      <span>Pickleball Bay Area</span>
    </a>
  </header>
</body>
</html>
